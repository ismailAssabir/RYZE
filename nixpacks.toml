[phases.setup]
nixPkgs = [
    "php83", 
    "php83Packages.composer", 
    "php83Extensions.pdo", 
    "php83Extensions.sqlite3",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.ctype"
]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan config:cache"
]

[start]
cmd = "php -S 0.0.0.0:${PORT} -t public"